name: Release Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version (e.g., 1.2.3)'
        required: false
        default: ''

env:
  GO_VERSION: "1.24.12"
  GOPROXY: "https://goproxy.cn,direct"
  # 请在 Gitea 仓库 Settings → Actions Secrets 中配置：
  # HARBOR_REGISTRY: Harbor 地址
  # HARBOR_PROJECT: Harbor 项目名
  # HARBOR_USER: Harbor 登录用户名
  # HARBOR_PASSWORD: Harbor 登录密码
  # GTEA_TOKEN: Gitea Access Token（用于 clone 代码）
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  PROJECT: ${{ secrets.HARBOR_PROJECT }}
  IMAGE_NAME: nssh

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4

      - name: Setup Go
        run: |
          GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
          MIRRORS=(
            "http://192.168.2.36/${GO_TARBALL}"
            "https://golang.google.cn/dl/${GO_TARBALL}"
          )
          for MIRROR in "${MIRRORS[@]}"; do
            if curl -fsSL --connect-timeout 30 --max-time 300 "$MIRROR" -o "/tmp/${GO_TARBALL}"; then
              break
            fi
            echo "Mirror failed: $MIRROR"
          done
          if [ -f "/tmp/${GO_TARBALL}" ]; then
            tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
            echo "/usr/local/go/bin" >> $GITHUB_PATH
            export PATH="/usr/local/go/bin:$PATH"
            go version
            go env -w GOPROXY=${GOPROXY}
          else
            echo "Error: Failed to download Go from all mirrors"
            exit 1
          fi

      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...

  build-and-push:
    needs: test
    runs-on: go-linux
    timeout-minutes: 30

    steps:
      - name: Checkout code
        run: |
          git clone --depth 1 "http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/${GITHUB_REPOSITORY}.git" .
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            git fetch --depth 1 origin tag "${TAG}"
            git checkout "${TAG}"
          fi

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-$(date +%Y%m%d%H%M%S)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Version: ${VERSION}"

      - name: Build Docker image
        run: |
          IMAGE="${REGISTRY}/${PROJECT}/${IMAGE_NAME}"
          LATEST_TAG="${IMAGE}:latest"
          echo "Building ${IMAGE}:${VERSION} and ${LATEST_TAG} ..."
          DOCKER_BUILDKIT=0 docker build \
            --build-arg BASE_REGISTRY="192.168.2.88:80/library/" \
            --build-arg VERSION=${VERSION} \
            -f docker/Dockerfile \
            -t ${IMAGE}:${VERSION} \
            -t ${LATEST_TAG} \
            .
          echo "Build complete"

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${REGISTRY} \
            -u "${{ secrets.HARBOR_USER }}" --password-stdin

      - name: Push Docker image
        run: |
          IMAGE="${REGISTRY}/${PROJECT}/${IMAGE_NAME}"
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest
          echo "Push complete"
