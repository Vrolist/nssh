name: Release Standard Platforms

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.24.12"
  GOPROXY: "https://goproxy.cn,direct"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4

      - name: Setup Go
        run: |
          GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
          MIRRORS=(
            "http://192.168.2.36/${GO_TARBALL}"
            "https://golang.google.cn/dl/${GO_TARBALL}"
          )
          for MIRROR in "${MIRRORS[@]}"; do
            if curl -fsSL --connect-timeout 30 --max-time 300 "$MIRROR" -o "/tmp/${GO_TARBALL}"; then
              break
            fi
            echo "Mirror failed: $MIRROR"
          done
          if [ -f "/tmp/${GO_TARBALL}" ]; then
            tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
            echo "/usr/local/go/bin" >> $GITHUB_PATH
            export PATH="/usr/local/go/bin:$PATH"
            go version
            go env -w GOPROXY=${GOPROXY}
          else
            echo "Error: Failed to download Go from all mirrors"
            exit 1
          fi

      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...

  build:
    needs: test
    runs-on: go-linux
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            label: linux-amd64
          - goos: linux
            goarch: arm64
            label: linux-arm64
          - goos: darwin
            goarch: amd64
            label: darwin-amd64
          - goos: darwin
            goarch: arm64
            label: darwin-arm64
          - goos: freebsd
            goarch: amd64
            label: freebsd-amd64
          - goos: freebsd
            goarch: 386
            label: freebsd-386
          - goos: freebsd
            goarch: arm64
            label: freebsd-arm64

    steps:
      - name: Checkout code
        run: |
          git clone --depth 1 "http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/${GITHUB_REPOSITORY}.git" .
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            git fetch --depth 1 origin tag "${TAG}"
            git checkout "${TAG}"
          fi

      - name: Setup Go
        run: |
          if [ -x /usr/local/go/bin/go ]; then
            export PATH="/usr/local/go/bin:$PATH"
            echo "/usr/local/go/bin" >> $GITHUB_PATH
            echo "Go already installed at /usr/local/go"
          else
            DOWNLOAD_CMD=""
            command -v curl >/dev/null 2>&1 && DOWNLOAD_CMD="curl -fsSL --connect-timeout 30 --max-time 300 -o"
            command -v wget >/dev/null 2>&1 && DOWNLOAD_CMD="wget -q --connect-timeout=30 --timeout=300 -O"
            if [ -z "$DOWNLOAD_CMD" ]; then
              echo "Error: neither curl nor wget available"
              exit 1
            fi
            GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
            MIRRORS=(
              "http://192.168.2.36/${GO_TARBALL}"
              "https://golang.google.cn/dl/${GO_TARBALL}"
            )
            for MIRROR in "${MIRRORS[@]}"; do
              echo "Downloading from $MIRROR ..."
              if $DOWNLOAD_CMD "/tmp/${GO_TARBALL}" "$MIRROR"; then
                break
              fi
              echo "Mirror failed: $MIRROR"
            done
            if [ -f "/tmp/${GO_TARBALL}" ]; then
              tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
              echo "/usr/local/go/bin" >> $GITHUB_PATH
              export PATH="/usr/local/go/bin:$PATH"
            else
              echo "Error: Failed to download Go from all mirrors"
              exit 1
            fi
          fi
          go version
          go env -w GOPROXY=${GOPROXY}

      - name: Get version info
        id: version
        env:
          GOTOOLCHAIN: local
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOTOOLCHAIN: local
          VERSION: ${{ steps.version.outputs.VERSION }}
          COMMIT_ID: ${{ steps.version.outputs.COMMIT_ID }}
          LABEL: ${{ matrix.label }}
        run: |
          OUTPUT="nssh_${GOOS}_${GOARCH}"
          [ "${GOOS}" = "windows" ] && OUTPUT="${OUTPUT}.exe"
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.CommitID=${COMMIT_ID}" \
            -trimpath -o "${OUTPUT}" .

      - name: Upload to MinIO
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          LABEL: ${{ matrix.label }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ -z "${MINIO_ENDPOINT}" ] || [ -z "${MINIO_ACCESS_KEY}" ]; then
            echo "MinIO not configured, skipping upload"
            exit 0
          fi

          FILENAME="nssh_${GOOS}_${GOARCH}"
          [ "${GOOS}" = "windows" ] && FILENAME="${FILENAME}.exe"

          if [ ! -f "${FILENAME}" ]; then
            echo "Binary ${FILENAME} not found, skipping"
            exit 0
          fi

          if ! command -v mc >/dev/null 2>&1; then
            echo "Installing mc client..."
            curl -sL "http://dl.minio.org.cn/client/mc/release/linux-amd64/mc" -o /tmp/mc && chmod +x /tmp/mc
            export PATH="/tmp:$PATH"
          fi

          mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
          mc mb "minio/${MINIO_BUCKET}" 2>&1 || true

          TARGET_PATH="${VERSION}/${LABEL}/${FILENAME}"
          mc cp "${FILENAME}" "minio/${MINIO_BUCKET}/${TARGET_PATH}"
          echo "Uploaded ${FILENAME} to MinIO: ${MINIO_BUCKET}/${TARGET_PATH}"

      - name: Archive artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp nssh_* /tmp/artifacts/
          tar czf artifacts-${{ matrix.label }}.tar.gz \
            -C /tmp/artifacts .

  mirror-to-github:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          http_proxy: ${{ secrets.PROXY_URL }}
          https_proxy: ${{ secrets.PROXY_URL }}
        run: |
          GH_REPO_CLEAN="${GH_REPO#https://}"
          git remote add github "https://x-access-token:${GH_TOKEN}@${GH_REPO_CLEAN}"
          git push github HEAD:refs/heads/main --force
          git push github --tags --force
