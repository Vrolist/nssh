name: Release Standard Platforms

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.24.12"
  GOPROXY: "https://goproxy.cn,direct"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4

      - name: Setup Go
        run: |
          GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
          MIRRORS=(
            "http://192.168.2.36/${GO_TARBALL}"
            "https://golang.google.cn/dl/${GO_TARBALL}"
          )
          for MIRROR in "${MIRRORS[@]}"; do
            if curl -fsSL --connect-timeout 30 --max-time 300 "$MIRROR" -o "/tmp/${GO_TARBALL}"; then
              break
            fi
            echo "Mirror failed: $MIRROR"
          done
          if [ -f "/tmp/${GO_TARBALL}" ]; then
            tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
            echo "/usr/local/go/bin" >> $GITHUB_PATH
            export PATH="/usr/local/go/bin:$PATH"
            go version
            go env -w GOPROXY=${GOPROXY}
          else
            echo "Error: Failed to download Go from all mirrors"
            exit 1
          fi

      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            label: linux-amd64
          - goos: linux
            goarch: arm64
            label: linux-arm64
          - goos: darwin
            goarch: amd64
            label: darwin-amd64
          - goos: darwin
            goarch: arm64
            label: darwin-arm64
          - goos: freebsd
            goarch: amd64
            label: freebsd-amd64
          - goos: freebsd
            goarch: 386
            label: freebsd-386
          - goos: freebsd
            goarch: arm64
            label: freebsd-arm64

    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4

      - name: Setup Go
        run: |
          which go || {
            GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
            MIRRORS=(
              "http://192.168.2.36/${GO_TARBALL}"
              "https://golang.google.cn/dl/${GO_TARBALL}"
            )
            for MIRROR in "${MIRRORS[@]}"; do
              if curl -fsSL --connect-timeout 30 --max-time 300 "$MIRROR" -o "/tmp/${GO_TARBALL}"; then
                break
              fi
              echo "Mirror failed: $MIRROR"
            done
            if [ -f "/tmp/${GO_TARBALL}" ]; then
              tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
              echo "/usr/local/go/bin" >> $GITHUB_PATH
              export PATH="/usr/local/go/bin:$PATH"
            else
              echo "Error: Failed to download Go from all mirrors"
              exit 1
            fi
          }
          go version
          go env -w GOPROXY=${GOPROXY}

      - name: Get version info
        id: version
        env:
          GOTOOLCHAIN: local
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOTOOLCHAIN: local
          VERSION: ${{ steps.version.outputs.VERSION }}
          COMMIT_ID: ${{ steps.version.outputs.COMMIT_ID }}
        run: |
          OUTPUT="nssh_${GOOS}_${GOARCH}"
          [ "${GOOS}" = "windows" ] && OUTPUT="${OUTPUT}.exe"
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.CommitID=${COMMIT_ID}" \
            -trimpath -o "${OUTPUT}" .

      - name: Archive artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp nssh_* /tmp/artifacts/
          tar czf artifacts-${{ matrix.label }}.tar.gz \
            -C /tmp/artifacts .

  mirror-to-github:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: http://x-access-token:${{ secrets.GTEA_TOKEN }}@192.168.2.27/buladou/checkout@v4
        with:
          fetch-depth: 0

      # 请先在 Gitea 仓库 Settings → Actions Secrets 中配置：
      # GH_TOKEN: GitHub Personal Access Token（public_repo 权限）
      # GH_REPO: GitHub 仓库路径，如 github.com/Vrolist/nssh.git
      - name: Push to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: |
          git remote add github "https://x-access-token:${GH_TOKEN}@${GH_REPO}"
          git push github HEAD:main --force
          git push github --tags --force
