name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22.0"
  GO_DOWNLOAD_URL: "http://192.168.2.36"
  GOPROXY: "https://goproxy.cn,direct"
  GOSUMDB: "sum.golang.google.cn"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: http://192.168.2.27:1022/buladou/checkout@v4

      - name: Setup Go
        run: |
          curl -ksSL "${GO_DOWNLOAD_URL}/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          export PATH="/usr/local/go/bin:$PATH"
          go version
          go env -w GOPROXY=${GOPROXY}
          go env -w GOSUMDB=${GOSUMDB}

      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...
