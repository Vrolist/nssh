name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Go
        run: |
          GO_VERSION="1.22.0"
          curl -ksSL "https://golang.google.cn/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          export PATH="/usr/local/go/bin:$PATH"
          go version
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=sum.golang.google.cn

      - name: Run base_core tests
        run: go test ./...
        working-directory: base_core

      - name: Run base_tunnel tests
        run: go test ./...
        working-directory: base_tunnel

      - name: Run daemon tests
        run: go test ./...
        working-directory: daemon
