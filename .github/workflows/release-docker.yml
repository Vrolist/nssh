name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nwy/nssh

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          IMAGE_LOWER="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "IMAGE=${REGISTRY}/${IMAGE_LOWER}/${IMAGE_NAME}" >> $GITHUB_ENV

      # Cross-compile Go binaries natively (no QEMU for compilation)
      - name: Build amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          GOTOOLCHAIN: local
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -trimpath -o nssh_linux_amd64 .

      - name: Build arm64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
          GOTOOLCHAIN: local
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -trimpath -o nssh_linux_arm64 .

      # Build separate images, push as intermediate tags, then merge manifest
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for packaging only, not compilation)
        uses: docker/setup-qemu-action@v3

      - name: Build and push amd64 image
        run: |
          mkdir -p build/amd64
          cp nssh_linux_amd64 build/amd64/nssh
          cp docker/entrypoint.sh build/amd64/entrypoint.sh
          cp docker/Dockerfile.noshell build/amd64/Dockerfile
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.IMAGE }}:amd64 \
            --push \
            build/amd64/

      - name: Build and push arm64 image
        run: |
          mkdir -p build/arm64
          cp nssh_linux_arm64 build/arm64/nssh
          cp docker/entrypoint.sh build/arm64/entrypoint.sh
          cp docker/Dockerfile.noshell build/arm64/Dockerfile
          docker buildx build \
            --platform linux/arm64 \
            --tag ${{ env.IMAGE }}:arm64 \
            --push \
            build/arm64/

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ env.VERSION }} \
            ${{ env.IMAGE }}:amd64 \
            ${{ env.IMAGE }}:arm64
          echo "Pushed ${{ env.IMAGE }}:${{ env.VERSION }} (amd64+arm64)"
