name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nwy/nssh

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Run tests
        run: |
          GOTOOLCHAIN=local go test -C base_core ./...
          GOTOOLCHAIN=local go test -C base_tunnel ./...
          GOTOOLCHAIN=local go test -C daemon ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          IMAGE_LOWER="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "IMAGE=${REGISTRY}/${IMAGE_LOWER}/${IMAGE_NAME}" >> $GITHUB_ENV

      # ---- Step 1: Go cross-compile (pure Go, no QEMU) ----
      - name: Build amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          GOTOOLCHAIN: local
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -trimpath -o nssh_linux_amd64 .

      - name: Build arm64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
          GOTOOLCHAIN: local
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -trimpath -o nssh_linux_arm64 .

      # ---- Step 2: Prepare rootfs (no QEMU for either arch) ----
      # amd64: extract rootfs from native docker container
      - name: Prepare amd64 rootfs
        run: |
          docker create --name amd64-alpine alpine:3.18
          mkdir -p build/amd64/rootfs
          docker cp amd64-alpine:/etc build/amd64/rootfs/etc
          docker cp amd64-alpine:/usr build/amd64/rootfs/usr
          docker cp amd64-alpine:/lib build/amd64/rootfs/lib
          docker cp amd64-alpine:/bin build/amd64/rootfs/bin
          docker cp amd64-alpine:/sbin build/amd64/rootfs/sbin
          docker rm amd64-alpine

          # Remove runtime dirs (Docker provides these)
          rm -rf build/amd64/rootfs/etc/{hosts,resolv.conf}
          rm -rf build/amd64/rootfs/dev
          rm -rf build/amd64/rootfs/proc
          rm -rf build/amd64/rootfs/sys

          # Add nssh user
          echo 'nssh:x:1000:1000::/home/nssh:/bin/false' >> build/amd64/rootfs/etc/passwd
          echo 'nssh:x:1000:' >> build/amd64/rootfs/etc/group

          # Application (ensure executable)
          cp nssh_linux_amd64 build/amd64/nssh
          chmod +x build/amd64/nssh
          cp docker/entrypoint.sh build/amd64/
          chmod +x build/amd64/entrypoint.sh
          cp docker/Dockerfile.scratch build/amd64/Dockerfile

      # arm64: download minirootfs tarball (no QEMU, no docker run)
      - name: Prepare arm64 rootfs
        run: |
          mkdir -p build/arm64/rootfs
          curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/v3.18/releases/aarch64/alpine-minirootfs-3.18.0-aarch64.tar.gz" \
            -o /tmp/alpine-arm64.tar.gz
          tar xzf /tmp/alpine-arm64.tar.gz -C build/arm64/rootfs

          # Remove runtime dirs (Docker provides these)
          rm -rf build/arm64/rootfs/dev
          rm -rf build/arm64/rootfs/proc
          rm -rf build/arm64/rootfs/sys

          # Add nssh user
          echo 'nssh:x:1000:1000::/home/nssh:/bin/false' >> build/arm64/rootfs/etc/passwd
          echo 'nssh:x:1000:' >> build/arm64/rootfs/etc/group

          # Application (ensure executable)
          cp nssh_linux_arm64 build/arm64/nssh
          chmod +x build/arm64/nssh
          cp docker/entrypoint.sh build/arm64/
          chmod +x build/arm64/entrypoint.sh
          cp docker/Dockerfile.scratch build/arm64/Dockerfile

      # ---- Step 3: Build & push (COPY only, no QEMU) ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.IMAGE }}:amd64 \
            --push \
            build/amd64/

      - name: Build and push arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --tag ${{ env.IMAGE }}:arm64 \
            --push \
            build/arm64/

      # ---- Step 4: Merge into multi-arch manifest ----
      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ env.VERSION }} \
            ${{ env.IMAGE }}:amd64 \
            ${{ env.IMAGE }}:arm64
          echo "Pushed ${{ env.IMAGE }}:${{ env.VERSION }} (amd64+arm64)"
